name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Publish
        run: dotnet publish -c Release -o output

      - name: Set repo base path
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          BASE_PATH="/${REPO_NAME}/"

          # Update base href in index.html
          sed -i "s|<base href=\"/\" />|<base href=\"${BASE_PATH}\" />|g" output/wwwroot/index.html

          # Update service worker base path
          sed -i "s|const base = \"/\"|const base = \"${BASE_PATH}\"|g" output/wwwroot/service-worker-assets.js 2>/dev/null || true
          sed -i "s|const base = \"/\"|const base = \"${BASE_PATH}\"|g" output/wwwroot/service-worker.js 2>/dev/null || true

          # Find and patch the published service worker
          find output/wwwroot -name "service-worker*.js" -exec sed -i "s|const base = \"/\"|const base = \"${BASE_PATH}\"|g" {} \;

      - name: Copy index.html to 404.html (SPA routing)
        run: cp output/wwwroot/index.html output/wwwroot/404.html

      - name: Disable Jekyll and remove pre-compressed files
        run: |
          touch output/wwwroot/.nojekyll
          find output/wwwroot/_framework -name "*.gz" -delete 2>/dev/null || true
          find output/wwwroot/_framework -name "*.br" -delete 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
