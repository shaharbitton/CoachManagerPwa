name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Publish
        run: dotnet publish -c Release -o output

      - name: Update base href
        run: sed -i 's|<base href="/" />|<base href="/${{ github.event.repository.name }}/" />|g' output/wwwroot/index.html

      - name: Copy index.html to 404.html
        run: cp output/wwwroot/index.html output/wwwroot/404.html

      - name: Add .nojekyll
        run: touch output/wwwroot/.nojekyll

      - name: Rewrite fingerprinted assets for GitHub Pages
        run: |
          cd output/wwwroot/_framework
          # Rename dotnet.native.*.js files that have no extension or unusual names
          # Ensure all .js, .wasm, .dat files are accessible
          for f in $(find . -name "*.gz"); do rm "$f"; done
          for f in $(find . -name "*.br"); do rm "$f"; done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
